services:
  # -----------------------------------------------
  # Backend — Node.js / Express / MongoDB
  # -----------------------------------------------
  - type: web
    name: bugpilot-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set your MongoDB Atlas URI in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false          # Set to your deployed frontend URL
      - key: GEMINI_API_KEY
        sync: false          # Optional — leave blank to use heuristic fallbacks
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/health

  # -----------------------------------------------
  # Frontend — React / Create React App
  # -----------------------------------------------
  - type: web
    name: bugpilot-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # Set to your backend URL, e.g. https://bugpilot-server.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        sync: false          # Set to your backend URL, e.g. https://bugpilot-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
